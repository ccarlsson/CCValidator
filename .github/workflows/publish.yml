name: Publish

on:
  push:
    tags:
      - "v*.*.*"  # e.g. v0.1.0, v0.1.0-preview.1

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      # Strip the leading 'v' from the tag to get the NuGet version
      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "src/CCValidator/bin/Release/*.nupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "src/CCValidator.DependencyInjection/bin/Release/*.nupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "src/CCValidator.AspNetCore/bin/Release/*.nupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "src/CCValidator.Serilog/bin/Release/*.nupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push symbols to NuGet.org
        run: |
          dotnet nuget push "src/CCValidator/bin/Release/*.snupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "src/CCValidator.DependencyInjection/bin/Release/*.snupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "src/CCValidator.AspNetCore/bin/Release/*.snupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "src/CCValidator.Serilog/bin/Release/*.snupkg" \
            -k ${{ secrets.NUGET_API_KEY }} \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
